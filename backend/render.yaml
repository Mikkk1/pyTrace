services:
  - type: web
    name: pytrace-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
